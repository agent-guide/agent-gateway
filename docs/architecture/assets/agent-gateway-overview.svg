<svg xmlns="http://www.w3.org/2000/svg" width="1950" height="1500" viewBox="0 0 1300 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="arrowI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1300" height="1000" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">agent-gateway — Connect, Manage &amp; Observe Your Agents</text>
  <text x="600" y="76" text-anchor="middle" font-size="15" fill="#475569">Consumers reach agents over HTTP / ACP; agents reach external resources over LLM / MCP — every hop proxied and observed by one gateway</text>

  <!-- Agents (top) -->
  <rect x="430" y="110" width="620" height="212" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="138" font-size="14" font-weight="700" fill="#334155">Agents — managed &amp; observed by the gateway</text>
  <rect x="450" y="150" width="288" height="152" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="594" y="194" text-anchor="middle" font-size="18" font-weight="800" fill="#0e7490">CLI Coding Agents</text>
  <text x="594" y="220" text-anchor="middle" font-size="13" fill="#334155">Codex · Claude Code · OpenCode</text>
  <rect x="494" y="248" width="200" height="36" rx="18" fill="#06b6d4"/>
  <text x="594" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Low-code · plug in via ACP</text>
  <rect x="742" y="150" width="288" height="152" rx="12" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="886" y="194" text-anchor="middle" font-size="18" font-weight="800" fill="#6d28d9">Custom Agents</text>
  <text x="886" y="220" text-anchor="middle" font-size="13" fill="#334155">your own agent · any stack</text>
  <rect x="786" y="248" width="200" height="36" rx="18" fill="#8b5cf6"/>
  <text x="886" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Full control · observed</text>

  <!-- Consumers (left) -->
  <rect x="70" y="470" width="230" height="190" rx="14" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="90" y="498" font-size="14" font-weight="700" fill="#4338ca">Consumers</text>
  <rect x="90" y="510" width="190" height="62" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="185" y="548" text-anchor="middle" font-size="16" fill="#1e293b">User</text>
  <rect x="90" y="582" width="190" height="62" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="185" y="619" text-anchor="middle" font-size="15" fill="#1e293b">SaaS / Business App</text>

  <!-- Gateway (center) -->
  <rect x="420" y="420" width="640" height="300" rx="18" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <path d="M420,438 Q420,420 438,420 L1042,420 Q1060,420 1060,438 L1060,468 L420,468 Z" fill="url(#gwGrad)"/>
  <text x="442" y="452" font-size="20" font-weight="800" fill="#ffffff">agent-gateway</text>
  <text x="1042" y="451" text-anchor="end" font-size="13" fill="#e0e7ff">Connect · Manage · Observe</text>

  <!-- Agent control API row (flows 1,2) -->
  <text x="444" y="508" font-size="14" font-weight="700" fill="#3730a3">Agent Control API</text>
  <text x="444" y="526" font-size="11" fill="#64748b">consumers drive agents · ①②</text>
  <rect x="660" y="488" width="80" height="34" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="700" y="511" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">ACP</text>
  <rect x="750" y="488" width="92" height="34" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="796" y="511" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">HTTP</text>

  <!-- Resource access API row (flows 3,4) -->
  <text x="444" y="558" font-size="14" font-weight="700" fill="#0369a1">Resource Access API</text>
  <text x="444" y="576" font-size="11" fill="#64748b">agents reach resources · ③④</text>
  <rect x="660" y="538" width="80" height="34" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="700" y="561" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">LLM</text>
  <rect x="750" y="538" width="92" height="34" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="796" y="561" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">MCP</text>

  <!-- Observability hero strip -->
  <rect x="436" y="590" width="608" height="118" rx="12" fill="url(#obsGrad)"/>
  <rect x="460" y="626" width="8" height="14" fill="#ffffff"/>
  <rect x="471" y="618" width="8" height="22" fill="#ffffff"/>
  <rect x="482" y="610" width="8" height="30" fill="#ffffff"/>
  <rect x="493" y="602" width="8" height="38" fill="#ffffff"/>
  <text x="516" y="632" font-size="21" font-weight="800" fill="#ffffff">Observability</text>
  <text x="722" y="632" font-size="12" font-style="italic" fill="#d1fae5">the core of the gateway — every run captured</text>
  <rect x="460" y="652" width="118" height="34" rx="17" fill="#ffffff"/>
  <text x="519" y="675" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Audit Logs</text>
  <rect x="590" y="652" width="132" height="34" rx="17" fill="#ffffff"/>
  <text x="656" y="675" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Token Usage</text>
  <rect x="734" y="652" width="168" height="34" rx="17" fill="#ffffff"/>
  <text x="818" y="675" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Call-Chain Tracing</text>
  <rect x="914" y="652" width="108" height="34" rx="17" fill="#ffffff"/>
  <text x="968" y="675" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Governance</text>

  <!-- Resources (bottom) -->
  <rect x="400" y="798" width="680" height="152" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="420" y="826" font-size="14" font-weight="700" fill="#334155">External Resources</text>
  <rect x="420" y="840" width="200" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="520" y="880" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">LLM Providers</text>
  <text x="520" y="902" text-anchor="middle" font-size="11" fill="#64748b">OpenAI · Anthropic · Gemini</text>
  <rect x="636" y="840" width="180" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="726" y="891" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">MCP Servers</text>
  <rect x="832" y="840" width="208" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="936" y="882" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">RAG /</text>
  <text x="936" y="902" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Knowledge Base</text>

  <!-- (1) Consumers -> Gateway -->
  <path d="M300,560 L416,560" stroke="#4f46e5" stroke-width="2.4" fill="none" marker-end="url(#arrowI)"/>
  <text x="358" y="544" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">① HTTP / ACP API</text>

  <!-- (2) Gateway -> Agents -->
  <path d="M680,416 L680,326" stroke="#4f46e5" stroke-width="2.4" fill="none" marker-end="url(#arrowI)"/>
  <text x="668" y="378" text-anchor="end" font-size="13" font-weight="700" fill="#4338ca">② launch &amp; drive</text>

  <!-- (3) Agents -> Gateway -->
  <path d="M820,326 L820,416" stroke="#059669" stroke-width="2.4" fill="none" marker-end="url(#arrowG)"/>
  <text x="832" y="378" text-anchor="start" font-size="13" font-weight="700" fill="#047857">③ LLM / MCP API</text>

  <!-- (4) Gateway -> Resources -->
  <path d="M740,722 L740,794" stroke="#059669" stroke-width="2.6" fill="none" marker-end="url(#arrowG)"/>
  <text x="754" y="762" font-size="13" font-weight="700" fill="#047857">④ proxied &amp; observed</text>

  <!-- Caption -->
  <text x="600" y="982" text-anchor="middle" font-size="14" fill="#475569">① consumer calls the gateway → ② gateway drives an agent → ③ the agent calls back through the gateway for LLM / MCP → ④ the gateway proxies it to upstream resources</text>
</svg>
