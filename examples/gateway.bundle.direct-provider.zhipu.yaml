apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: zhipu-test
    provider_type: zhipu
    api_key: ${ZHIPU_API_KEY}
    default_model: glm-5.1

llmRoutes:
  - id: chat-zhipu
    llm_api: openai
    match:
      path_prefix: /chatzhipu
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: zhipu-test

virtualKeys:
  - id: vk-local-chat-zhipu
    tag: local-test
    allowed_route_ids:
      - chat-zhipu
