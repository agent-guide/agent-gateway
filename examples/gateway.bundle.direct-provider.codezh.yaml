apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: ccodezh-test
    provider_type: claudecode
    base_url: https://us-api.ccodezh.com
    api_key: ${ANTHROPIC_API_KEY}
    default_model: claude-sonnet-4-6
    network:
      proxy_url: http://127.0.0.1:7890
      # The claudecode provider sends the full Claude Code CLI fingerprint
      # (User-Agent, X-App, X-Stainless-*, anthropic-version, anthropic-beta)
      # by default. Only override here to match a newer CLI release, e.g.:
      #   extra_headers:
      #     User-Agent: claude-cli/2.1.158 (external, cli)
      #     anthropic-beta: <new beta flag list>
    options:
      api_key_header: authorization
      codex_compat: true

  - id: codexzh-test
    provider_type: codex
    base_url: https://us-api.codexzh.com/v1
    api_key: ${OPENAI_API_KEY}
    default_model: gpt-5.5
    network:
      proxy_url: http://127.0.0.1:7890
    options:
      cc_compat: true

llmRoutes:
  - id: chat
    protocol: openai
    match_policy:
      path_prefix: /
      methods:
        - POST
        - GET
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: ccodezh-test
      credential_type_order:
        - api_key

virtualKeys:
  - id: vk-llm-test
    tag: local-test
    allowed_route_ids:
      - chat
