apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: zhipu-test
    provider_type: zhipu
    api_key: ${ZHIPU_API_KEY}
    default_model: glm-5.1
  - id: deepseek-test
    provider_type: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    default_model: deepseek-v4-pro

managedModels:
  - provider_id: zhipu-test
    upstream_model: glm-5.1
    enabled: true
  - provider_id: deepseek-test
    upstream_model: deepseek-v4-pro
    enabled: true

llmRoutes:
  - id: chat-test-logical-model
    llm_api: openai
    match_policy:
      path_prefix: /chattestlogicalmodel
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      default_model: chat-default
      model_targets:
        - name: code-default
          candidates:
            - provider_id: zhipu-test
              upstream_model: glm-5.1
              weight: 100
        - name: chat-default
          candidates:
            - provider_id: deepseek-test
              upstream_model: deepseek-v4-pro
              weight: 100

virtualKeys:
  - id: vk-local-chat-test-logical-model
    tag: local-test
    allowed_route_ids:
      - chat-test-logical-model
