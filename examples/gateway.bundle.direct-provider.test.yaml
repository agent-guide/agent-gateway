apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: zhipu-test
    provider_type: zhipu
    api_key: ${ZHIPU_API_KEY}
    default_model: glm-5.1
    options:
      cc_compat: true

  - id: deepseek-test
    provider_type: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    default_model: deepseek-v4-pro

llmRoutes:
  - id: chat
    protocol: cc
    match_policy:
      path_prefix: /
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: zhipu-test

virtualKeys:
  - id: vk-llm-test
    tag: local-test
    allowed_route_ids:
      - chat
