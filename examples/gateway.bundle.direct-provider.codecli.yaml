apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: codex-test
    provider_type: codex
    default_model: gpt-5.4
    network:
      proxy_url: http://127.0.0.1:7890

  - id: claudecode-test
    provider_type: claudecode
    default_model: claude-sonnet-4-6
    network:
      proxy_url: http://127.0.0.1:7890

llmRoutes:
  - id: chat
    protocol: cc
    match_policy:
      path_prefix: /
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: claudecode-test
      credential_type_order:
        - cliauth_token

virtualKeys:
  - id: vk-llm-test
    tag: local-test
    allowed_route_ids:
      - chat
