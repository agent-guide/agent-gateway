apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: openai-main
    provider_type: openai
    api_key: ${OPENAI_API_KEY}
    default_model: gpt-4.1

llmRoutes:
  - id: chat-prod
    llm_api: openai
    match_policy:
      path_prefix: /
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: openai-main

virtualKeys:
  - id: vk-local-test
    tag: local-test
    allowed_route_ids:
      - chat-prod
