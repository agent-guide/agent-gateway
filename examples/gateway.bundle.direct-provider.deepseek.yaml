apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providers:
  - id: deepseek-test
    provider_type: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    default_model: deepseek-v4-pro

routes:
  - id: chat-deepseek
    llm_api: openai
    match:
      path_prefix: /chatdeepseek
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      provider_target:
        provider_id: deepseek-test

virtualKeys:
  - id: vk-local-chat-deepseek
    tag: local-test
    allowed_route_ids:
      - chat-deepseek
