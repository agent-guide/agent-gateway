apiVersion: gateway.agw/v1alpha1
kind: GatewayBundle

providerTypes:
  - provider_type: openai
    enabled: true
  - provider_type: anthropic
    enabled: true

llmApiHandlerTypes:
  - llm_api_handler_type: openai
    enabled: true
  - llm_api_handler_type: anthropic
    enabled: true

providers:
  - id: openai-main
    provider_type: openai
    api_key: ${OPENAI_API_KEY}
    default_model: gpt-4.1
  - id: anthropic-main
    provider_type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    default_model: claude-sonnet-4-5

managedModels:
  - provider_id: openai-main
    upstream_model: gpt-4.1
    enabled: true
  - provider_id: anthropic-main
    upstream_model: claude-sonnet-4-5
    enabled: true

routes:
  - id: chat-prod
    llm_api: openai
    match:
      path_prefix: /
      methods:
        - POST
    auth_policy:
      require_virtual_key: true
    target_policy:
      default_model: chat-default
      model_targets:
        - name: chat-default
          candidates:
            - provider_id: openai-main
              upstream_model: gpt-4.1
              weight: 100
        - name: reasoning-default
          candidates:
            - provider_id: anthropic-main
              upstream_model: claude-sonnet-4-5
              weight: 100

virtualKeys:
  - id: vk-prod
    tag: prod
    allowed_route_ids:
      - chat-prod
